<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
    <defs>
        <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8000FF;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- 背景圆 -->
    <circle cx="16" cy="16" r="15" fill="#0a0a1a" stroke="url(#favGradient)" stroke-width="1.5"/>
    
    <!-- 中心M字母 -->
    <text x="16" y="22" 
          font-family="Arial, sans-serif" 
          font-size="18" 
          font-weight="bold" 
          fill="url(#favGradient)" 
          text-anchor="middle">M</text>
    
    <!-- 顶部装饰点 -->
    <circle cx="16" cy="6" r="1.5" fill="url(#favGradient)"/>
    <circle cx="6" cy="16" r="1.5" fill="url(#favGradient)"/>
    <circle cx="26" cy="16" r="1.5" fill="url(#favGradient)"/>
    <circle cx="16" cy="26" r="1.5" fill="url(#favGradient)"/>
</svg>
